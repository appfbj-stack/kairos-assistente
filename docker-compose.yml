services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=kairos
      - POSTGRES_USER=kairos
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairos -d kairos"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - kairos_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=3010
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=kairos
      - POSTGRES_USER=kairos
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - kairos_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kairos_network
    labels:
      - "traefik.enable=true"
      # /api/license/verify fica público — os apps satélites consultam sem autenticação
      - "traefik.http.routers.kairos-license.rule=Host(`${ADMIN_DOMAIN}`) && PathPrefix(`/api/license/verify`)"
      - "traefik.http.routers.kairos-license.tls.certresolver=letsencrypt"
      - "traefik.http.routers.kairos-license.priority=100"
      - "traefik.http.routers.kairos-license.service=kairos-backend"
      # Restante da API (/api/admin, /api/chat, /api/license/create-trial, etc.) — protegido por senha
      - "traefik.http.routers.kairos-api.rule=Host(`${ADMIN_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.kairos-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.kairos-api.priority=50"
      - "traefik.http.routers.kairos-api.service=kairos-backend"
      - "traefik.http.routers.kairos-api.middlewares=kairos-auth"
      - "traefik.http.services.kairos-backend.loadbalancer.server.port=3010"
      - "traefik.http.middlewares.kairos-auth.basicauth.users=${TRAEFIK_AUTH_USERS}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://${ADMIN_DOMAIN}/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - kairos_network
    labels:
      - "traefik.enable=true"
      # Painel (UI) — protegido pela mesma senha da API
      - "traefik.http.routers.kairos-frontend.rule=Host(`${ADMIN_DOMAIN}`)"
      - "traefik.http.routers.kairos-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.kairos-frontend.priority=1"
      - "traefik.http.routers.kairos-frontend.middlewares=kairos-auth"
      - "traefik.http.services.kairos-frontend.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  kairos_data:

networks:
  kairos_network:
    external: true
