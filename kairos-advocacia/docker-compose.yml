version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kairos_advocacia}:${POSTGRES_PASSWORD:-Advocacia2026!}@${POSTGRES_HOST:-kairos-assistente-kairos-assistente-kgavlc-postgres-1}:5432/${POSTGRES_DB:-kairos}
      DATABASE_SCHEMA: ${DATABASE_SCHEMA:-kairos_advocacia}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      KAIROS_ADMIN_URL: ${KAIROS_ADMIN_URL:-http://kairos-assistente-kairos-assistente-kgavlc-backend-1:3010}
      KAIROS_CLIENT_ID: ${KAIROS_CLIENT_ID:-27f044ea-9490-433d-9c26-4317416853da}
      KAIROS_ADMIN_BASIC_USER: ${KAIROS_ADMIN_BASIC_USER:-borgesjaf@gmail.com}
      KAIROS_ADMIN_BASIC_PASSWORD: ${KAIROS_ADMIN_BASIC_PASSWORD:-Borges1972@}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@escritorio.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-escritorio@2026}
    volumes:
      - documentos_data:/app/storage
    ports:
      - "8025:8000"
    networks:
      - kairos_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://api.advocacia.fbautomacao.space}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3045:80"
    networks:
      - kairos_network

volumes:
  documentos_data:

networks:
  kairos_network:
    external: true
