version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fotoagenda
      POSTGRES_USER: fotoagenda
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fotoagenda_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fotoagenda -d fotoagenda"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kairos_network

  fotoagenda-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fotoagenda:${POSTGRES_PASSWORD:-fotoagenda_secret}@postgres:5432/fotoagenda
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      KAIROS_CLIENT_ID: ${KAIROS_CLIENT_ID:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      HERMES_API_URL: ${HERMES_API_URL:-}
      HERMES_EMAIL: ${HERMES_EMAIL:-}
      HERMES_PASSWORD: ${HERMES_PASSWORD:-}
    ports:
      - "8030:8000"
    networks:
      - kairos_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-}
    restart: unless-stopped
    depends_on:
      - fotoagenda-backend
    ports:
      - "3050:80"
    networks:
      - kairos_network

volumes:
  postgres_data:

networks:
  kairos_network:
    external: true
